name: klyradb
base: core22
version: '0.3.0'
summary: Local database manager — PostgreSQL, MySQL, MariaDB, Redis
description: |
  KlyraDB manages isolated PostgreSQL, MySQL, MariaDB and Redis instances.
  No Docker. No config files. Just click and run.

  Bundled engines (no host installation required):
    PostgreSQL: 14, 15, 16, 17
    MySQL: 8.0
    Redis: 6.x

  MariaDB and newer Redis versions are detected if present on the host.

grade: devel
confinement: classic
compression: lzo

architectures:
  - build-on: amd64

package-repositories:
  - type: apt
    key-id: B97B0AFCAA1A47F044F244A07FCC7D46ACCC4CF8
    key-url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    url: https://apt.postgresql.org/pub/repos/apt
    suites: [jammy-pgdg]
    components: [main]

apps:
  klyradb:
    command: bin/klyradb
    desktop: share/applications/klyradb.desktop
    environment:
      LD_LIBRARY_PATH: "$SNAP/usr/lib/$SNAP_ARCH-linux-gnu:$SNAP/usr/lib:$LD_LIBRARY_PATH"
      PATH: "$SNAP/usr/lib/postgresql/17/bin:$SNAP/usr/lib/postgresql/16/bin:$SNAP/usr/lib/postgresql/15/bin:$SNAP/usr/lib/postgresql/14/bin:$SNAP/usr/sbin:$SNAP/usr/bin:$PATH"

parts:
  klyradb:
    plugin: nil
    source: .
    build-packages:
      - golang-go
      - gcc
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
      - pkg-config
      - npm
    override-build: |
      export GOFLAGS="-mod=mod"
      go install github.com/wailsapp/wails/v2/cmd/wails@latest
      $HOME/go/bin/wails build -platform linux/amd64 -tags webkit2_41
      install -D build/bin/klyradb $CRAFT_PART_INSTALL/bin/klyradb
      install -D build/appicon.png $CRAFT_PART_INSTALL/share/icons/hicolor/512x512/apps/klyradb.png
      install -D snap/local/klyradb.desktop $CRAFT_PART_INSTALL/share/applications/klyradb.desktop

  deps:
    plugin: nil
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - postgresql-14
      - postgresql-15
      - postgresql-16
      - postgresql-17
      - postgresql-common
      - postgresql-client-common
      - mysql-server-8.0
      - redis-server
      - redis-tools
