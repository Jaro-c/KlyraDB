name: klyradb
title: KlyraDB
base: core22
version: '0.7.1'
summary: Local database manager — PostgreSQL, MySQL, MariaDB, Redis, MongoDB
description: |
  KlyraDB manages isolated PostgreSQL, MySQL, MariaDB and Redis instances.
  No Docker. No config files. Just click and run.

  Engines are downloaded and installed on demand — only install what you need.

license: Apache-2.0
contact: https://github.com/Jaro-c/KlyraDB/issues
website: https://github.com/Jaro-c/KlyraDB
source-code: https://github.com/Jaro-c/KlyraDB
issues: https://github.com/Jaro-c/KlyraDB/issues
donation: https://github.com/sponsors/Jaro-c

grade: stable
confinement: strict
compression: lzo

layout:
  /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1

architectures:
  - build-on: amd64

apps:
  klyradb:
    command: bin/klyradb
    desktop: share/applications/klyradb.desktop
    plugs:
      - network
      - network-bind
      - system-observe
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - opengl
    environment:
      DISPLAY: "${DISPLAY}"
      WAYLAND_DISPLAY: "${WAYLAND_DISPLAY}"
      XDG_RUNTIME_DIR: "${XDG_RUNTIME_DIR}"
      GIO_EXTRA_MODULES: "${SNAP}/usr/lib/x86_64-linux-gnu/gio/modules"
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"

parts:
  klyradb:
    plugin: nil
    source: .
    build-packages:
      - gcc
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
      - pkg-config
      - npm
      - curl
    override-build: |
      curl -fsSL https://go.dev/dl/go1.26.2.linux-amd64.tar.gz | tar -C /usr/local -xz
      export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH"
      GOFLAGS="-mod=mod" go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      go clean -cache
      wails build -platform linux/amd64 -tags webkit2_41
      install -D build/bin/klyradb $CRAFT_PART_INSTALL/bin/klyradb
      [ -f build/appicon.png ] && install -D build/appicon.png $CRAFT_PART_INSTALL/share/icons/hicolor/512x512/apps/klyradb.png || true
      install -D snap/local/klyradb.desktop $CRAFT_PART_INSTALL/share/applications/klyradb.desktop

  deps:
    plugin: nil
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - glib-networking
      - libglib2.0-0
      - shared-mime-info
