name: klyradb
base: core22
version: '0.4.2'
summary: Local database manager — PostgreSQL, MySQL, MariaDB, Redis
description: |
  KlyraDB manages isolated PostgreSQL, MySQL, MariaDB and Redis instances.
  No Docker. No config files. Just click and run.

  Bundled engines (no host installation required):
    PostgreSQL: 16, 17, 18
    MySQL: 8.0
    MariaDB: 10.6
    Redis: 6.x

grade: devel
confinement: classic
compression: lzo

architectures:
  - build-on: amd64

package-repositories:
  - type: apt
    key-id: B97B0AFCAA1A47F044F244A07FCC7D46ACCC4CF8
    url: https://apt.postgresql.org/pub/repos/apt
    suites: [jammy-pgdg]
    components: [main]

apps:
  klyradb:
    command: bin/klyradb
    desktop: share/applications/klyradb.desktop
    environment:
      LD_LIBRARY_PATH: "$SNAP/usr/lib/$SNAP_ARCH-linux-gnu:$SNAP/usr/lib:$SNAP/opt/klyra-mysql/lib:$SNAP/opt/klyra-mariadb/lib:$LD_LIBRARY_PATH"
      PATH: "$SNAP/opt/klyra-mysql/sbin:$SNAP/opt/klyra-mysql/bin:$SNAP/opt/klyra-mariadb/sbin:$SNAP/opt/klyra-mariadb/bin:$SNAP/usr/lib/postgresql/18/bin:$SNAP/usr/lib/postgresql/17/bin:$SNAP/usr/lib/postgresql/16/bin:$SNAP/usr/sbin:$SNAP/usr/bin:$PATH"

parts:
  klyradb:
    plugin: nil
    source: .
    build-packages:
      - gcc
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
      - pkg-config
      - npm
      - curl
    override-build: |
      curl -fsSL https://go.dev/dl/go1.24.3.linux-amd64.tar.gz | tar -C /usr/local -xz
      export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH"
      export GOFLAGS="-mod=mod"
      go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.2
      wails build -platform linux/amd64 -tags webkit2_41
      install -D build/bin/klyradb $CRAFT_PART_INSTALL/bin/klyradb
      install -D build/appicon.png $CRAFT_PART_INSTALL/share/icons/hicolor/512x512/apps/klyradb.png
      install -D snap/local/klyradb.desktop $CRAFT_PART_INSTALL/share/applications/klyradb.desktop

  deps:
    plugin: nil
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - postgresql-16
      - postgresql-17
      - postgresql-18
      - postgresql-common
      - postgresql-client-common
      - redis-server
      - redis-tools

  # MySQL 8.0 extracted to /opt/klyra-mysql/ to avoid file conflicts with MariaDB.
  # Both packages ship /usr/sbin/mysqld, /usr/lib/mysql/plugin/, /usr/share/mysql/ etc.
  mysql-bundled:
    plugin: nil
    stage-packages:
      - mysql-server-8.0
    override-build: |
      PREFIX="$SNAPCRAFT_PART_INSTALL/opt/klyra-mysql"
      SRC="$SNAPCRAFT_PART_INSTALL"
      mkdir -p "$PREFIX/sbin" "$PREFIX/bin" "$PREFIX/lib" "$PREFIX/share"

      for f in mysqld mysqld_safe; do
        [ -f "$SRC/usr/sbin/$f" ] && mv "$SRC/usr/sbin/$f" "$PREFIX/sbin/"
      done
      for f in mysql mysqladmin mysqlcheck mysqldump mysql_upgrade mysql_ssl_rsa_setup; do
        [ -f "$SRC/usr/bin/$f" ] && mv "$SRC/usr/bin/$f" "$PREFIX/bin/"
      done
      [ -d "$SRC/usr/lib/mysql" ]     && mv "$SRC/usr/lib/mysql"     "$PREFIX/lib/mysql"
      [ -d "$SRC/usr/share/mysql" ]   && mv "$SRC/usr/share/mysql"   "$PREFIX/share/mysql"
      [ -d "$SRC/usr/share/mysql-8.0" ] && mv "$SRC/usr/share/mysql-8.0" "$PREFIX/share/mysql-8.0"

  # MariaDB 10.6 extracted to /opt/klyra-mariadb/ — isolated prefix, same reason.
  # Only opt/klyra-mariadb/* and libmariadb* are staged to avoid duplicating
  # system libs already contributed by the mysql-bundled part.
  mariadb-bundled:
    plugin: nil
    stage-packages:
      - mariadb-server
    override-build: |
      PREFIX="$SNAPCRAFT_PART_INSTALL/opt/klyra-mariadb"
      SRC="$SNAPCRAFT_PART_INSTALL"
      mkdir -p "$PREFIX/sbin" "$PREFIX/bin" "$PREFIX/lib" "$PREFIX/share"

      for f in mariadbd mysqld; do
        [ -f "$SRC/usr/sbin/$f" ] && mv "$SRC/usr/sbin/$f" "$PREFIX/sbin/"
      done
      for f in mariadbd-safe mysqld_safe mariadbd_safe \
               mariadb mysql \
               mariadb-admin mysqladmin \
               mariadb-install-db mysql_install_db; do
        [ -f "$SRC/usr/bin/$f" ] && mv "$SRC/usr/bin/$f" "$PREFIX/bin/"
      done
      [ -d "$SRC/usr/lib/mysql" ]          && mv "$SRC/usr/lib/mysql"          "$PREFIX/lib/mysql"
      [ -d "$SRC/usr/share/mysql" ]        && mv "$SRC/usr/share/mysql"        "$PREFIX/share/mysql"
      [ -d "$SRC/usr/share/mysql-common" ] && mv "$SRC/usr/share/mysql-common" "$PREFIX/share/mysql-common"
    stage:
      - opt/klyra-mariadb
      - usr/lib/x86_64-linux-gnu/libmariadb*
