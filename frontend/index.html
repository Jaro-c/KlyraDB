<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KlyraDB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="src/style.css" />
    <script>
      (function(){
        var t=localStorage.getItem('klyraTheme')||'dark';
        var a=t==='system'?(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'):t;
        document.documentElement.dataset.theme=a;
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <ellipse cx="12" cy="5" rx="9" ry="3"/>
              <path d="M3 5v5c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
              <path d="M3 10v5c0 1.66 4.03 3 9 3s9-1.34 9-3v-5"/>
              <path d="M3 15v4c0 1.66 4.03 3 9 3s9-1.34 9-3v-4"/>
            </svg>
          </div>
          <div class="brand-text">
            <h1>KlyraDB</h1>
            <span data-i18n="app.tagline"></span>
          </div>
        </div>

        <nav class="nav">
          <div class="nav-label" data-i18n="nav.library"></div>
          <button class="nav-item active" data-view="instances">
            <span class="dot"></span> <span data-i18n="nav.instances"></span>
          </button>
          <button class="nav-item" data-view="versions">
            <span class="dot"></span> <span data-i18n="nav.versions"></span>
          </button>
          <button class="nav-item" data-view="logs">
            <span class="dot"></span> <span data-i18n="nav.logs"></span>
          </button>
          <div class="nav-label" data-i18n="nav.preferences" style="margin-top:12px"></div>
          <button class="nav-item" data-view="settings">
            <span class="dot"></span> <span data-i18n="nav.settings"></span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="status-pill">
            <span class="pulse"></span>
            <span id="footer-status" data-i18n="footer.ready"></span>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="view-title"></h2>
            <p id="view-sub" class="muted"></p>
          </div>
          <button class="btn-primary" id="btn-new">
            <span class="plus">+</span> <span data-i18n="btn.new"></span>
          </button>
        </header>

        <section id="view-instances" class="view">
          <div id="filter-bar" class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="postgres">
              <span class="db-icon postgres"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><ellipse cx="17" cy="9.5" rx="3.5" ry="5" opacity=".45"/><ellipse cx="11" cy="11" rx="7" ry="6.5"/><path d="M5.5 15.5Q3 20 4.5 22Q6.5 23.5 9 21.5Q10 19.5 8 16.5Z"/><circle cx="9" cy="9.5" r="1.4" fill="white"/><path d="M8.5 14.5Q11 16.2 13.5 14.5" fill="none" stroke="white" stroke-width="1.1" stroke-linecap="round"/></svg></span> PostgreSQL
            </button>
            <button class="filter-btn" data-filter="mysql">
              <span class="db-icon mysql"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 5C7.6 5 4.5 8 4.5 11c0 1 .3 1.9.8 2.7C4.5 14.7 4 16.2 4 18c0 .6.1 1.1.2 1.6L12 22l7.8-2.4c.1-.5.2-1 .2-1.6 0-1.8-.5-3.3-1.3-4.3.5-.8.8-1.7.8-2.7C19.5 8 16.4 5 12 5Z"/><path d="M15 5C15.5 2.5 17.5 1.5 19.5 3Q17.5 4 16.5 5.5Z"/><circle cx="10" cy="12" r="1.4" fill="white"/><circle cx="14" cy="12" r="1.4" fill="white"/><path d="M9 15.5Q12 17.5 15 15.5" fill="none" stroke="white" stroke-width="1.1" stroke-linecap="round"/></svg></span> MySQL
            </button>
            <button class="filter-btn" data-filter="mariadb">
              <span class="db-icon mariadb"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 19.5C3.5 14 6.5 8 11.5 5.5c-.5 2.5-.9 5.5.1 7.5C13 10.5 15.5 8 19 6.5c-.8 2.5-1.3 5.5-.6 7.5C20 12 22 10.5 24 10.5c-.9 2-1.8 5.5-1.2 8H4Z"/></svg></span> MariaDB
            </button>
            <button class="filter-btn" data-filter="redis">
              <span class="db-icon redis"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2L22 7.5 12 13 2 7.5Z" opacity=".45"/><path d="M2 7.5L12 13v9L2 16.5Z" opacity=".8"/><path d="M22 7.5L12 13v9l10-4.5Z"/></svg></span> Redis
            </button>
          </div>
          <div id="empty" class="empty hidden">
            <div class="empty-art"></div>
            <h3 data-i18n="empty.title"></h3>
            <p data-i18n="empty.desc"></p>
            <button class="btn-primary" id="btn-empty-new" data-i18n="empty.btn"></button>
          </div>
          <div id="cards" class="cards"></div>
        </section>

        <section id="view-versions" class="view hidden">
          <div id="versions" class="versions-grid"></div>
        </section>

        <section id="view-logs" class="view hidden">
          <div class="logs-box">
            <p class="muted" data-i18n="sub.logs"></p>
          </div>
        </section>

        <section id="view-settings" class="view hidden">
          <div class="settings-layout">
            <div class="settings-row">
              <div class="settings-row-info">
                <span class="settings-label" data-i18n="settings.language"></span>
                <span class="settings-desc" data-i18n="settings.language_desc"></span>
              </div>
              <select id="setting-locale" class="settings-select"></select>
            </div>
            <div class="settings-row">
              <div class="settings-row-info">
                <span class="settings-label" data-i18n="settings.theme"></span>
                <span class="settings-desc" data-i18n="settings.theme_desc"></span>
              </div>
              <div class="theme-picker">
                <button class="theme-btn" data-theme="dark"   data-i18n="settings.theme_dark"></button>
                <button class="theme-btn" data-theme="light"  data-i18n="settings.theme_light"></button>
                <button class="theme-btn" data-theme="system" data-i18n="settings.theme_system"></button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- New Instance Modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <h3 data-i18n="modal.title"></h3>
        <label>
          <span data-i18n="modal.type"></span>
          <div class="db-type-picker" id="f-type-picker">
            <button class="db-type-btn active" data-type="postgres">
              <span class="db-icon postgres"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><ellipse cx="17" cy="9.5" rx="3.5" ry="5" opacity=".45"/><ellipse cx="11" cy="11" rx="7" ry="6.5"/><path d="M5.5 15.5Q3 20 4.5 22Q6.5 23.5 9 21.5Q10 19.5 8 16.5Z"/><circle cx="9" cy="9.5" r="1.4" fill="white"/><path d="M8.5 14.5Q11 16.2 13.5 14.5" fill="none" stroke="white" stroke-width="1.1" stroke-linecap="round"/></svg></span>
              <span>PostgreSQL</span>
            </button>
            <button class="db-type-btn" data-type="mysql">
              <span class="db-icon mysql"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 5C7.6 5 4.5 8 4.5 11c0 1 .3 1.9.8 2.7C4.5 14.7 4 16.2 4 18c0 .6.1 1.1.2 1.6L12 22l7.8-2.4c.1-.5.2-1 .2-1.6 0-1.8-.5-3.3-1.3-4.3.5-.8.8-1.7.8-2.7C19.5 8 16.4 5 12 5Z"/><path d="M15 5C15.5 2.5 17.5 1.5 19.5 3Q17.5 4 16.5 5.5Z"/><circle cx="10" cy="12" r="1.4" fill="white"/><circle cx="14" cy="12" r="1.4" fill="white"/><path d="M9 15.5Q12 17.5 15 15.5" fill="none" stroke="white" stroke-width="1.1" stroke-linecap="round"/></svg></span>
              <span>MySQL</span>
            </button>
            <button class="db-type-btn" data-type="mariadb">
              <span class="db-icon mariadb"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 19.5C3.5 14 6.5 8 11.5 5.5c-.5 2.5-.9 5.5.1 7.5C13 10.5 15.5 8 19 6.5c-.8 2.5-1.3 5.5-.6 7.5C20 12 22 10.5 24 10.5c-.9 2-1.8 5.5-1.2 8H4Z"/></svg></span>
              <span>MariaDB</span>
            </button>
            <button class="db-type-btn" data-type="redis">
              <span class="db-icon redis"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2L22 7.5 12 13 2 7.5Z" opacity=".45"/><path d="M2 7.5L12 13v9L2 16.5Z" opacity=".8"/><path d="M22 7.5L12 13v9l10-4.5Z"/></svg></span>
              <span>Redis</span>
            </button>
          </div>
        </label>
        <label>
          <span data-i18n="modal.name"></span>
          <input id="f-name" type="text" autocomplete="off"/>
        </label>
        <label>
          <span data-i18n="modal.version"></span>
          <select id="f-version"></select>
        </label>
        <label>
          <span data-i18n="modal.port"></span>
          <input id="f-port" type="number" min="1024" max="65535"/>
        </label>
        <div id="modal-error" class="error hidden"></div>
        <div class="modal-actions">
          <button class="btn-ghost" id="m-cancel" data-i18n="btn.cancel"></button>
          <button class="btn-primary" id="m-create" data-i18n="btn.create"></button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
