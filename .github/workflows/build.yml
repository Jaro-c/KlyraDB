name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Test
        run: go test ./internal/...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: System dependencies (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        env:
          GOFLAGS: "-mod=mod"

      - name: Build (Linux)
        if: matrix.name == 'linux'
        run: wails build -tags webkit2_41
        env:
          GOFLAGS: "-mod=mod"

      - name: Build (Windows)
        if: matrix.name == 'windows'
        run: wails build -nsis
        env:
          GOFLAGS: "-mod=mod"

      - name: Build (macOS)
        if: matrix.name == 'macos'
        run: wails build
        env:
          GOFLAGS: "-mod=mod"

      - name: Rename artifact (Linux)
        if: matrix.name == 'linux'
        run: mv build/bin/klyradb build/bin/klyradb-linux-amd64

      - name: Rename artifacts (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          Move-Item build/bin/klyradb.exe build/bin/klyradb-windows-amd64.exe
          if (Test-Path "build/bin/klyradb-amd64-installer.exe") {
            Move-Item build/bin/klyradb-amd64-installer.exe build/bin/klyradb-windows-amd64-setup.exe
          }

      - name: Package .app (macOS)
        if: matrix.name == 'macos'
        run: cd build/bin && zip -r klyradb-macos-arm64.zip klyradb.app

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: klyradb-${{ matrix.name }}
          path: |
            build/bin/klyradb-linux-amd64
            build/bin/klyradb-windows-amd64.exe
            build/bin/klyradb-windows-amd64-setup.exe
            build/bin/klyradb-macos-arm64.zip
          if-no-files-found: ignore
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: KlyraDB ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
