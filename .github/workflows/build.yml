name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for release (e.g. v0.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -tags webkit2_41
        env:
          GOFLAGS: "-mod=mod"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: klyradb-linux-amd64
          path: build/bin/klyradb
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/klyradb
          name: KlyraDB ${{ github.ref_name }}
          generate_release_notes: true
