name: Snap

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snap:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build snap
        uses: snapcore/action-build@b391f430cb2650fd359ed4d2cfe88b2c481800e0 # v1
        id: build

      - name: Upload snap artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: klyradb-snap
          path: ${{ steps.build.outputs.snap }}
          retention-days: 30

      - name: Upload snap to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload "${{ github.ref_name }}" "${{ steps.build.outputs.snap }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Snap Store
        if: startsWith(github.ref, 'refs/tags/v')
        uses: snapcore/action-publish@9334eecb267cfd97a0ce3c8654215d095927252f # v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
