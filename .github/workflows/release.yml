name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          cache: true

      - name: Test
        run: go test ./internal/...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          cache: true

      - name: System dependencies (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        env:
          GOFLAGS: "-mod=mod"

      - name: Build (Linux)
        if: matrix.name == 'linux'
        run: wails build -tags webkit2_41
        env:
          GOFLAGS: "-mod=mod"

      - name: Build (Windows)
        if: matrix.name == 'windows'
        run: wails build -nsis
        env:
          GOFLAGS: "-mod=mod"

      - name: Build (macOS)
        if: matrix.name == 'macos'
        run: wails build
        env:
          GOFLAGS: "-mod=mod"

      - name: Rename artifact (Linux)
        if: matrix.name == 'linux'
        run: mv build/bin/klyradb build/bin/klyradb-linux-amd64

      - name: Rename artifacts (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          Move-Item build/bin/klyradb.exe build/bin/klyradb-windows-amd64.exe
          if (Test-Path "build/bin/klyradb-amd64-installer.exe") {
            Move-Item build/bin/klyradb-amd64-installer.exe build/bin/klyradb-windows-amd64-setup.exe
          }

      - name: Package .app (macOS)
        if: matrix.name == 'macos'
        run: cd build/bin && zip -r klyradb-macos-arm64.zip klyradb.app

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: klyradb-${{ matrix.name }}
          path: |
            build/bin/klyradb-linux-amd64
            build/bin/klyradb-windows-amd64.exe
            build/bin/klyradb-windows-amd64-setup.exe
            build/bin/klyradb-macos-arm64.zip
          if-no-files-found: ignore
          retention-days: 30

  snap:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build snap
        uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1
        id: build

      - name: Upload snap artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: klyradb-snap
          path: ${{ steps.build.outputs.snap }}
          retention-days: 30

      - name: Publish to Snap Store
        if: startsWith(github.ref, 'refs/tags/v')
        uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40 # v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable

  release:
    needs: [build, snap]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: KlyraDB ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
